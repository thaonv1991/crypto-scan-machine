services:
  # ==================== Core Application ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoscan-api
    env_file: .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - DATABASE_URL_SYNC=postgresql://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== Celery Workers ====================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoscan-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - DATABASE_URL_SYNC=postgresql://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoscan-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - DATABASE_URL_SYNC=postgresql://cryptoscan:${POSTGRES_PASSWORD}@postgres:5432/cryptoscan
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Celery Flower (Task Monitoring) ====================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoscan-flower
    command: celery -A app.tasks.celery_app flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  # ==================== Database ====================
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cryptoscan-postgres
    environment:
      POSTGRES_DB: cryptoscan
      POSTGRES_USER: cryptoscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptoscan_pass}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backups:/backups
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1536MB}
      - -c
      - work_mem=${PG_WORK_MEM:-32MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-256MB}
      - -c
      - max_connections=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoscan -d cryptoscan"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: cryptoscan-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  # ==================== MinIO (Object Storage) ====================
  minio:
    image: minio/minio:latest
    container_name: cryptoscan-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: cryptoscan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
      mc mb local/cryptoscan --ignore-existing;
      mc mb local/cryptoscan-backups --ignore-existing;
      exit 0;
      "

  # ==================== Nginx Reverse Proxy ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: cryptoscan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: cryptoscan-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ==================== Monitoring ====================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cryptoscan-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=5GB
      - --web.enable-lifecycle
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cryptoscan-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ==================== Node Exporter (System Metrics) ====================
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: cryptoscan-node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

  # ==================== PostgreSQL Exporter ====================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cryptoscan-pg-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://cryptoscan:${POSTGRES_PASSWORD:-cryptoscan_pass}@postgres:5432/cryptoscan?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

  # ==================== Redis Exporter ====================
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: cryptoscan-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

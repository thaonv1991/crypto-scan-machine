version: '3.8'

services:
  # Lõi Cỗ Máy Quét (Backend)
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-cryptoscan}:${DB_PASSWORD:-cryptoscan_pass}@db:5432/${DB_NAME:-cryptoscan}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000" # Nhốt cổng, chỉ cho Nginx gọi vào
    depends_on:
      - db
      - redis
    networks:
      - internal_network

  # Giao Diện Web (Frontend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "127.0.0.1:3000:80" # Nhốt cổng, chỉ Nginx được quyền truy cập
    networks:
      - internal_network

  # Động cơ Background (Celery & AI Agent)
  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -l INFO
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-cryptoscan}:${DB_PASSWORD:-cryptoscan_pass}@db:5432/${DB_NAME:-cryptoscan}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal_network

  # Máy Lắng Nghe Blockchain (Websocket)
  listener:
    build: 
      context: .
      dockerfile: Dockerfile
    command: python -m app.services.realtime.uniswap_listener
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-cryptoscan}:${DB_PASSWORD:-cryptoscan_pass}@db:5432/${DB_NAME:-cryptoscan}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - internal_network

  # Cơ Sở Dữ Liệu (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_network
    # KHÔNG MỞ CỔNG RA NGOÀI (Chống Hacker)

  # Bộ Nhớ Đệm (Redis)
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - internal_network
    # KHÔNG MỞ CỔNG RA NGOÀI

  # 🛡️ Dịch Vụ Backup Tự Động (Cronjob)
  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily" # Backup tự động 1 lần/ngày
      BACKUP_KEEP_DAYS: 7 # Giữ bản backup trong 7 ngày
    volumes:
      - /opt/backups:/backups
    networks:
      - internal_network
    depends_on:
      - db

networks:
  internal_network:
    driver: bridge # Mạng nội bộ cách ly hoàn toàn với Internet

volumes:
  pgdata:
  redisdata:
